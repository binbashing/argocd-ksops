name: Build and Push Multi-Arch Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      argocd_version:
        description: "ArgoCD image version (e.g. v3.2.3)"
        required: true
        default: "v3.2.3"
      ksops_version:
        description: "KSOPS image version (e.g. v4.4.0)"
        required: true
        default: "v4.4.0"
      kustomize_version:
        description: "Kustomize version label (e.g. v5.0.0)"
        required: true
        default: "v5.0.0"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve versions
        id: versions
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            ARGOCD_VERSION="${GITHUB_REF_NAME}"
            KSOPS_VERSION="v4.4.0"
            KUSTOMIZE_VERSION="v5.0.0"
          else
            ARGOCD_VERSION="${{ github.event.inputs.argocd_version }}"
            KSOPS_VERSION="${{ github.event.inputs.ksops_version }}"
            KUSTOMIZE_VERSION="${{ github.event.inputs.kustomize_version }}"
          fi
          echo "argocd_version=${ARGOCD_VERSION}" >> "$GITHUB_OUTPUT"
          echo "ksops_version=${KSOPS_VERSION}" >> "$GITHUB_OUTPUT"
          echo "kustomize_version=${KUSTOMIZE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.versions.outputs.argocd_version }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ARGOCD_VERSION=${{ steps.versions.outputs.argocd_version }}
            KSOPS_VERSION=${{ steps.versions.outputs.ksops_version }}
            KUSTOMIZE_VERSION=${{ steps.versions.outputs.kustomize_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
