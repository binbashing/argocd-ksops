name: Build and Push Multi-Arch Image

on:
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 06:00 UTC
  workflow_dispatch:
    inputs:
      argocd_version:
        description: "ArgoCD image version (e.g. v3.2.3). Leave empty for latest."
        required: false
      ksops_version:
        description: "KSOPS image version (e.g. v4.4.0). Leave empty for latest."
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve versions
        id: versions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ github.event.inputs.argocd_version }}" ]; then
            ARGOCD_VERSION="${{ github.event.inputs.argocd_version }}"
          else
            ARGOCD_VERSION=$(gh api repos/argoproj/argo-cd/releases/latest --jq '.tag_name')
          fi

          if [ -n "${{ github.event.inputs.ksops_version }}" ]; then
            KSOPS_VERSION="${{ github.event.inputs.ksops_version }}"
          else
            KSOPS_VERSION=$(gh api repos/viaduct-ai/kustomize-sops/releases/latest --jq '.tag_name')
          fi

          echo "argocd_version=${ARGOCD_VERSION}" >> "$GITHUB_OUTPUT"
          echo "ksops_version=${KSOPS_VERSION}" >> "$GITHUB_OUTPUT"
          echo "### Resolved versions" >> "$GITHUB_STEP_SUMMARY"
          echo "- ArgoCD: ${ARGOCD_VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "- KSOPS: ${KSOPS_VERSION}" >> "$GITHUB_STEP_SUMMARY"

      - name: Verify images exist
        run: |
          echo "Verifying quay.io/argoproj/argocd:${{ steps.versions.outputs.argocd_version }}..."
          docker manifest inspect "quay.io/argoproj/argocd:${{ steps.versions.outputs.argocd_version }}" > /dev/null

          echo "Verifying viaductoss/ksops:${{ steps.versions.outputs.ksops_version }}..."
          docker manifest inspect "viaductoss/ksops:${{ steps.versions.outputs.ksops_version }}" > /dev/null

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            docker.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.versions.outputs.argocd_version }}
            type=sha
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ARGOCD_VERSION=${{ steps.versions.outputs.argocd_version }}
            KSOPS_VERSION=${{ steps.versions.outputs.ksops_version }}

